# Retrieval Budget Configuration
# Task-type specific token budgets for memory retrieval

retrieval_budget:
  explore:
    wiki_tokens: 4000
    factual_tokens: 2000
    experiential_tokens: 3000
    total_budget: 9000
    description: "Deep research tasks requiring broad context"

  locate:
    wiki_tokens: 2000
    factual_tokens: 3000
    experiential_tokens: 1000
    total_budget: 6000
    description: "Targeted searches for specific information"

  edit:
    wiki_tokens: 1000
    factual_tokens: 2000
    experiential_tokens: 500
    total_budget: 3500
    description: "Focused editing with minimal context needs"

  validate:
    wiki_tokens: 3000
    factual_tokens: 2000
    experiential_tokens: 2000
    total_budget: 7000
    description: "Verification tasks requiring balanced context"

# Token estimation: 4 characters ≈ 1 token
token_estimation_ratio: 4
criteria:
  accuracy:
    weight: 0.30
    description: "데이터 변환 결과가 정확한가?"
    checklist:
      - "데이터 변환 로직이 정확한가?"
      - "엣지 케이스 데이터가 처리되는가?"
      - "결측값/이상치 처리가 적절한가?"
  pipeline_integrity:
    weight: 0.25
    description: "파이프라인이 안정적으로 동작하는가?"
    checklist:
      - "파이프라인이 멱등성을 갖는가?"
      - "실패 시 재시작이 안전한가?"
      - "데이터 검증 단계가 있는가?"
  code_quality:
    weight: 0.20
    description: "코드가 표준을 준수하고 유지보수 가능한가?"
    checklist:
      - "코딩 표준/컨벤션을 준수하는가?"
      - "적절한 에러 핸들링이 있는가?"
      - "코드가 읽기 쉽고 구조적인가?"
  test_coverage:
    weight: 0.15
    checklist:
      - "변환 로직에 단위 테스트가 있는가?"
      - "샘플 데이터로 통합 테스트가 있는가?"
  documentation:
    weight: 0.10
    checklist:
      - "데이터 스키마 문서가 있는가?"
      - "파이프라인 흐름도가 있는가?"
passing_threshold: 0.7
golden_example_threshold: 0.85
domain_type: "data"

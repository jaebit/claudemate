criteria:
  role_separation:
    weight: 0.20
    description: "역할 간 책임/권한이 명확히 분리되는가?"
    checklist:
      - "각 에이전트의 책임이 명시적으로 정의되었는가?"
      - "역할 간 도구 접근 권한이 분리되었는가?"
      - "평가자가 구현자와 독립적으로 판정하는가?"
  prompt_quality:
    weight: 0.20
    description: "프롬프트가 구체적이고 검증 가능한 지시를 포함하는가?"
    checklist:
      - "각 에이전트 프롬프트에 구체적 절차가 포함되는가?"
      - "출력 형식이 명시되었는가?"
      - "모호한 지시('좋은 코드를 작성하라') 대신 검증 가능한 기준이 있는가?"
      - "few-shot 또는 chain-of-thought 전략이 프롬프트에 포함되었는가?"
      - "출력 스키마(JSON/YAML)가 명시적으로 정의되었는가?"
      - "프롬프트 내 역할 경계(system vs user vs assistant)가 분리되었는가?"
      - "재시도 시 프롬프트 변이(variation) 전략이 존재하는가?"
  tool_governance:
    weight: 0.15
    description: "도구 접근이 역할별로 제한되는가?"
    checklist:
      - "각 역할에 허용된 도구 목록이 명시되었는가?"
      - "위험한 도구에 대한 사전 검증이 있는가?"
      - "도구 실행 결과가 기록되는가?"
      - "도구 입출력 스키마가 JSON Schema로 정의되었는가?"
      - "도구별 부작용(side-effect)이 read-only/write/destructive로 분류되었는가?"
      - "도구 실패 시 fallback/retry 정책이 정의되었는가?"
  memory_design:
    weight: 0.15
    description: "메모리 계층이 분리되고 retrieval 기반인가?"
    checklist:
      - "instruction/long-term/session/runtime 메모리가 구분되는가?"
      - "메모리 로드 시 전체 덤프가 아닌 관련성 기반 조회를 사용하는가?"
      - "compact/resume 시 최소 재주입 집합이 정의되었는가?"
      - "메모리 계층별 TTL/만료 정책이 정의되었는가?"
      - "cross-session persistence 전략(세션 간 유지 데이터)이 명시되었는가?"
      - "context window 예산 내 메모리 로드 우선순위가 정의되었는가?"
  evaluation_quality:
    weight: 0.15
    description: "평가가 독립적이고 실행 기반인가?"
    checklist:
      - "평가가 코드 리뷰가 아닌 실행 검증을 포함하는가?"
      - "평가자가 구현자의 자기평가를 신뢰하지 않는가?"
      - "평가 기준이 사전 합의된 계약에 기반하는가?"
      - "평가자가 구현자와 별도 context에서 실행되는가(shared state 없음)?"
      - "평가 기준이 구현 시작 전 사전 합의(pre-commit)되었는가?"
      - "평가자의 도구 접근 범위가 구현자와 분리되었는가?"
  safety_boundary:
    weight: 0.15
    description: "자기수정/권한승격 방지가 작동하는가?"
    checklist:
      - "불변 경로가 기계적으로 보호되는가?"
      - "자기개선 대상과 금지 대상이 Tier로 분리되었는가?"
      - "위험 변경에 대한 인간 승인 게이트가 있는가?"
passing_threshold: 0.7
golden_example_threshold: 0.85
domain_type: "ai-agent"

criteria:
  functionality:
    weight: 0.30
    description: "핵심 기능이 명세대로 동작하는가?"
    checklist:
      - "모든 API 엔드포인트가 명세대로 동작하는가?"
      - "에지 케이스가 처리되는가?"
      - "에러 상황에서 적절한 HTTP 상태 코드를 반환하는가?"
  security:
    weight: 0.25
    description: "보안 요구사항을 충족하는가?"
    checklist:
      - "입력 검증이 수행되는가?"
      - "인증/인가가 적절하게 구현되었는가?"
      - "SQL 인젝션/XSS 방어가 있는가?"
      - "rate limiting이 적용되었는가?"
  code_quality:
    weight: 0.20
    description: "코드가 표준을 준수하고 유지보수 가능한가?"
    checklist:
      - "코딩 표준/컨벤션을 준수하는가?"
      - "적절한 에러 핸들링이 있는가?"
      - "코드가 읽기 쉽고 구조적인가?"
  test_coverage:
    weight: 0.15
    checklist:
      - "핵심 로직에 단위 테스트가 있는가?"
      - "통합 테스트가 있는가?"
      - "에러 경로 테스트가 있는가?"
  performance:
    weight: 0.10
    description: "성능 요구사항을 충족하는가?"
    checklist:
      - "쿼리 최적화가 되었는가?"
      - "캐싱 전략이 적절한가?"
      - "동시성 처리가 안전한가?"
passing_threshold: 0.7
golden_example_threshold: 0.85
domain_type: "backend"

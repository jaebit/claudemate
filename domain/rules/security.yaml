rules:
  - id: SEC-001
    name: "하드코딩된 시크릿 금지"
    pattern: "(password|secret|api_key|token)\\s*=\\s*['\"][^'\"]{8,}"
    severity: CRITICAL
  - id: SEC-002
    name: "SQL 인젝션 방지"
    pattern: "f['\"].*SELECT.*{.*}.*FROM"
    severity: CRITICAL
  - id: SEC-003
    name: "eval 사용 금지"
    pattern: "(eval|exec)\\s*\\("
    severity: HIGH

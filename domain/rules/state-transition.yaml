rules:
  - id: "allowed_state_transitions"
    name: "허용 상태 전이 규칙"
    severity: "critical"
    allowed_transitions:
      - from: "planned"
        to: "in_progress"
        description: "계획 완료 후 실행 시작"
      - from: "in_progress"
        to: "evaluating"
        description: "구현 완료 후 평가 진입"
      - from: "evaluating"
        to: "completed"
        description: "평가 통과 시 완료"
      - from: "evaluating"
        to: "in_progress"
        description: "평가 실패 시 재작업"
      - from: "in_progress"
        to: "blocked"
        description: "의존성 또는 외부 요인으로 차단"
      - from: "blocked"
        to: "in_progress"
        description: "차단 해제 후 재개"
      - from: "in_progress"
        to: "aborted"
        description: "치명적 실패 또는 인간 판단으로 중단"
      - from: "evaluating"
        to: "aborted"
        description: "평가 중 치명적 문제 발견으로 중단"

  - id: "forbidden_state_transitions"
    name: "금지 상태 전이 규칙"
    severity: "critical"
    forbidden_transitions:
      - from: "completed"
        to: "planned"
        reason: "완료된 스프린트를 계획 상태로 되돌릴 수 없음"
      - from: "completed"
        to: "in_progress"
        reason: "완료된 스프린트를 재실행할 수 없음 (새 스프린트 생성 필요)"
      - from: "aborted"
        to: "in_progress"
        reason: "중단된 스프린트를 직접 재개할 수 없음 (새 스프린트 생성 필요)"
      - from: "aborted"
        to: "planned"
        reason: "중단된 스프린트를 계획으로 되돌릴 수 없음"
      - from: "planned"
        to: "completed"
        reason: "계획에서 실행 없이 바로 완료할 수 없음"
      - from: "planned"
        to: "evaluating"
        reason: "계획에서 실행 없이 바로 평가할 수 없음"

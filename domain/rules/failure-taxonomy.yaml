# Failure Taxonomy — 8개 failure_class 정의
# artifact-schema.yaml의 failure_class 필드와 연동
# state-transition.yaml의 allowed_transitions와 매핑

failure_classes:
  - id: "missing_artifact"
    name: "Missing Artifact"
    severity: "high"
    description: "필수 산출물(파일, 디렉토리)이 누락된 경우"
    response_action: "retry"
    max_retries: 3
    escalate_after: "max_retries 초과 시 escalate"
    keywords:
      - "file not found"
      - "missing artifact"
      - "no such file"
      - "artifact not found"
      - "FileNotFoundError"
      - "does not exist"

  - id: "wrong_path"
    name: "Wrong Path"
    severity: "medium"
    description: "파일/디렉토리 경로가 잘못 지정된 경우"
    response_action: "repair"
    max_retries: 2
    escalate_after: "repair 2회 실패 시 escalate"
    keywords:
      - "wrong path"
      - "incorrect path"
      - "path mismatch"
      - "invalid path"
      - "not a directory"
      - "not a file"

  - id: "schema_error"
    name: "Schema Error"
    severity: "high"
    description: "YAML/JSON 스키마 검증 실패 (필수 필드 누락, 타입 불일치)"
    response_action: "repair"
    max_retries: 2
    escalate_after: "repair 2회 실패 시 escalate"
    keywords:
      - "schema error"
      - "validation error"
      - "required field"
      - "missing field"
      - "type error"
      - "YAMLError"
      - "JSONDecodeError"
      - "invalid format"

  - id: "verifier_failure"
    name: "Verifier Failure"
    severity: "high"
    description: "Evaluator/Verifier 검증 실패 (acceptance criteria 미충족)"
    response_action: "retry"
    max_retries: 2
    escalate_after: "max_retries 초과 시 escalate"
    keywords:
      - "verifier failure"
      - "verification failed"
      - "criteria not met"
      - "acceptance criteria"
      - "test failed"
      - "assertion error"
      - "AssertionError"

  - id: "tool_error"
    name: "Tool Error"
    severity: "medium"
    description: "MCP 도구 호출 실패 또는 예기치 않은 도구 응답"
    response_action: "retry"
    max_retries: 3
    escalate_after: "max_retries 초과 시 escalate"
    keywords:
      - "tool error"
      - "tool call failed"
      - "mcp error"
      - "server error"
      - "connection refused"
      - "tool not found"
      - "ToolError"

  - id: "timeout"
    name: "Timeout"
    severity: "medium"
    description: "작업 시간 초과 (도구 호출, 외부 프로세스 등)"
    response_action: "retry"
    max_retries: 2
    escalate_after: "max_retries 초과 시 escalate"
    keywords:
      - "timeout"
      - "timed out"
      - "time limit"
      - "deadline exceeded"
      - "TimeoutError"
      - "operation timed out"

  - id: "permission_denied"
    name: "Permission Denied"
    severity: "critical"
    description: "보호 경로/도구 접근 시도 차단 (trust boundary 위반)"
    response_action: "abort"
    human_approval_required: true
    escalate_after: "즉시 escalate — 인간 승인 필요"
    keywords:
      - "permission denied"
      - "access denied"
      - "forbidden"
      - "trust boundary"
      - "PermissionError"
      - "unauthorized"
      - "protected path"

  - id: "budget_exhausted"
    name: "Budget Exhausted"
    severity: "critical"
    description: "토큰/비용/시간 예산 소진"
    response_action: "abort"
    human_approval_required: true
    escalate_after: "즉시 escalate — 인간 승인 필요"
    keywords:
      - "budget exhausted"
      - "budget exceeded"
      - "token limit"
      - "cost limit"
      - "rate limit"
      - "quota exceeded"
      - "out of budget"

# failure_class → state_transition 매핑
# 모든 전이는 state-transition.yaml의 allowed_transitions에 정의된 값만 사용
state_transition_mapping:
  retry:
    description: "재시도 — 상태 유지 (in_progress)"
    transition: null  # 상태 전이 없음, in_progress 유지
  repair:
    description: "수정 시도 — 상태 유지 (in_progress)"
    transition: null  # 상태 전이 없음, in_progress 유지
  escalate:
    description: "자동 대응 실패 후 차단"
    transition:
      from: "in_progress"
      to: "blocked"
  abort:
    description: "치명적 실패로 중단"
    transition:
      from: "in_progress"
      to: "aborted"

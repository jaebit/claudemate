criteria:
  pipeline_correctness:
    weight: 0.20
    description: "상태 전이가 정의대로 작동하는가?"
    checklist:
      - "정의된 상태 전이만 허용되는가?"
      - "잘못된 상태 전이가 거부되는가?"
      - "각 Phase의 게이트 조건이 검증되는가?"
      - "허용 상태 전이 목록이 명시적으로 정의되어 있는가?"
      - "금지 전이 시도 시 에러 메시지와 함께 거부되는가?"
  artifact_discipline:
    weight: 0.15
    description: "artifact가 지정 경로에 올바른 스키마로 생성되는가?"
    checklist:
      - "Sprint Contract가 필수 필드를 포함하는가?"
      - "QA 결과가 구조화된 형식으로 저장되는가?"
      - "세대 아카이브가 올바른 스키마를 따르는가?"
      - "evaluation-result artifact가 필수 필드를 포함하는가?"
  failure_handling:
    weight: 0.15
    description: "실패 분류가 존재하고 대응 규칙이 작동하는가?"
    checklist:
      - "failure_class가 평가 결과에 포함되는가?"
      - "failure_class별 대응 규칙(retry/repair/abort/escalate)이 정의되었는가?"
      - "Reflector가 failure_class를 기반으로 attribution을 수행하는가?"
      - "retry 조건: 일시적 실패(timeout, rate-limit)에 대한 재시도 횟수와 간격이 정의되었는가?"
      - "repair 조건: 부분 실패 시 자동 수정 범위와 fallback 전략이 정의되었는가?"
      - "abort 조건: 치명적 실패(데이터 손상, 불변 규칙 위반) 시 즉시 중단 기준이 정의되었는가?"
      - "escalate 조건: 자동 대응 불가 시 인간 승인 요청 트리거가 정의되었는가?"
  resumability:
    weight: 0.10
    description: "중단 후 재개가 가능한가?"
    checklist:
      - "state JSON에 resume 포인터가 저장되는가?"
      - "재개 시 이전 완료 sprint를 건너뛰는가?"
      - "compact 이후 최소 artifact 집합이 재주입되는가?"
      - "checkpoint가 각 sprint 완료 시점에 저장되는가?"
      - "재개 시 state 무결성 검증(체크섬 또는 스키마 검증)이 수행되는가?"
      - "rollback 조건: checkpoint 손상 시 이전 checkpoint로 복구되는가?"
  governance_enforcement:
    weight: 0.08
    description: "불변 규칙, 권한 경계가 기계적으로 강제되는가?"
    checklist:
      - "immutable 경로 보호가 hook으로 강제되는가?"
      - "Tier별 허용 범위가 config에 따라 작동하는가?"
  context_efficiency:
    weight: 0.07
    description: "컨텍스트 로드량이 제어되는가?"
    checklist:
      - "세션 시작 시 로드되는 반성/스킬에 상한이 있는가?"
      - "compact 재주입 최소 집합이 정의되었는가?"
      - "context budget 상한(토큰 수 또는 파일 수)이 명시적으로 정의되어 있는가?"
      - "budget 초과 시 경고 또는 자동 축소가 작동하는가?"
  execution_verification:
    weight: 0.10
    description: "artifact가 실제 실행으로 검증되는가?"
    checklist:
      - "생성된 코드/설정 artifact에 대해 실행 기반 검증(테스트, lint, build)이 수행되는가?"
      - "정적 검증(스키마, 필드 존재)과 동적 검증(실행 결과)이 구분되어 있는가?"
      - "검증 실패 시 평가 점수에 반영되는가?"
      - "검증 결과가 구조화된 형식으로 기록되는가?"
  cost_time_control:
    weight: 0.05
    description: "스프린트별 시간/비용 예산이 정의되고 초과 시 중단되는가?"
    checklist:
      - "각 스프린트에 시간 예산(wall-clock 또는 토큰 소비량)이 정의되어 있는가?"
      - "비용 예산(API 호출 횟수 또는 금액 상한)이 정의되어 있는가?"
      - "예산 초과 시 자동 중단 또는 escalate가 트리거되는가?"
      - "실제 소비량이 artifact에 기록되는가?"
  agent_call_contract:
    weight: 0.05
    description: "agent 간 호출 시 입출력 스키마가 계약으로 정의되는가?"
    checklist:
      - "각 agent 호출의 입력 스키마(필수 필드, 타입)가 정의되어 있는가?"
      - "각 agent 호출의 출력 스키마(필수 필드, 타입)가 정의되어 있는가?"
      - "스키마 불일치 시 호출이 거부되거나 경고가 발생하는가?"
      - "agent 간 계약이 버전 관리되는가?"
  runtime_charter_separation:
    weight: 0.05
    description: "runtime 설정이 agent 정의와 분리되어 있는가?"
    checklist:
      - "agent 정의(역할, 프롬프트)와 runtime 설정(timeout, retry, concurrency)이 별도 파일로 분리되어 있는가?"
      - "runtime 설정 변경이 agent 정의 파일 수정 없이 가능한가?"
      - "runtime 설정에 대한 스키마 검증이 존재하는가?"
passing_threshold: 0.7
golden_example_threshold: 0.85
domain_type: "harness"

# Plugin Improvement Sweep — 2026-04-23
#
# 실행: /autohone:run --queue .autohone/data/task-queue-plugin-improvement.yaml
#
# 큐 모드로 7개 플러그인을 순차 개선합니다.
# 태스크 N의 Reflector가 생성/수정한 스킬이 태스크 N+1에 자동 적용됩니다 (복리 학습).
#
# 순서 근거:
#   worktree → gemini-cli → codex-cli → arch-guard → multi-model-debate → crew → autopilot
#   (작은 것 → 큰 것, 의존성 → 의존처, orchestrator는 마지막)

queue:
  id: "plugin-improvement-sweep-2026-04-23"
  name: "Claudemate 플러그인 일괄 개선 (7개)"
  created_at: "2026-04-23T21:36:00+09:00"
  started_at: "2026-04-23T21:53:00+09:00"
  status: "in_progress"           # pending | in_progress | completed | partially_completed
  pipeline: "full-cycle"           # 기본: Planner→Contract→Worker→Evaluator→Verifier→Reflector(항상)+자동 스킬 개선

  # 큐 전역 가드레일 (Planner가 각 태스크 컨트랙트 작성 시 반드시 참고)
  shared_constraints:
    golden_rules_reference: "CLAUDE.md"   # 프로젝트 루트 Golden Rules 전문
    allowed_write_paths:
      - "plugins/"
      - "README.md"
      - ".claude-plugin/marketplace.json"
      - "CHANGELOG.md"
    forbidden_write_paths:
      - ".autohone/domain/rules/"
      - ".autohone/domain/evaluator/validators/"
      - ".autohone/data/archive/"
    plugin_json_schema: ["name", "version", "description", "mcpServers"]  # 이외 필드 금지
    cross_platform_rules:
      - "경로: path.join / os.path.join 또는 ${CLAUDE_PLUGIN_ROOT} 사용"
      - "명령: python3 / node 사용 (cat/rm/type/sh 금지)"
    registry_sync_rule: "plugin.json version 변경 시 marketplace.json + README.md 동기화 필수"
    branch_policy: "모든 태스크는 auto/plugin-improvement-sweep 브랜치에서 실행. master 직접 커밋 금지"

  tasks:
    # ─────────────────────────────────────────────────────────────
    # Task 1: worktree (v0.1.0 / 3 skills / 최소 구조)
    # 큐 메커니즘 검증용 가장 작은 플러그인
    # ─────────────────────────────────────────────────────────────
    - id: "t1-worktree-polish"
      plugin: "worktree"
      started_at: "2026-04-23T21:53:00+09:00"
      completed_at: "2026-04-23T21:58:00+09:00"
      status: "completed"
      run_id: "queue-t1-worktree-polish-20260423"
      score: 1.0
      commits: ["7568d9b", "ab96509", "9746f97"]
      golden_example_eligible: true
      description: |
        worktree 플러그인을 Golden Rules에 정렬하고 v0.1.0 alpha 상태를 다진다.
        3개 skill(create/merge/cleanup)의 메타데이터·문서·예시를 일관화.
      acceptance_criteria:
        - "plugins/worktree/.claude-plugin/plugin.json: 허용 필드(name/version/description/mcpServers)만 존재"
        - "plugins/worktree/skills/*/SKILL.md: user_invocable 플래그 3/3개 존재 (현재 3/3 true — 유지)"
        - "plugins/worktree/README.md: create/merge/cleanup 각 skill의 실행 예시 최소 1개씩 포함"
        - "skill 본문: 크로스플랫폼 규칙 준수 (path.join/${CLAUDE_PLUGIN_ROOT}, python3/node)"
        - "버전 3자 일치: plugin.json(0.1.0) ↔ marketplace.json ↔ README.md 표"

    # ─────────────────────────────────────────────────────────────
    # Task 2: gemini-cli (v1.0.0 / skills 없음 / commands+hooks)
    # ─────────────────────────────────────────────────────────────
    - id: "t2-gemini-cli-harden"
      plugin: "gemini-cli"
      started_at: "2026-04-23T21:58:30+09:00"
      status: "in_progress"
      description: |
        gemini-cli 플러그인의 SessionStart prerequisite 체크 동작을 검증하고,
        commands와 hooks가 gemini CLI 부재·인증 실패 상황을 graceful하게 처리하도록 보강.
      acceptance_criteria:
        - "plugins/gemini-cli/hooks/hooks.json: SessionStart prerequisite 체크 훅이 gemini 미설치/미인증 시 명확한 에러 메시지 출력"
        - "plugins/gemini-cli/commands/*.md: gemini 실행 실패 시 bash fallback 또는 사용자 안내 포함 (silent fail 금지)"
        - "plugins/gemini-cli/README.md: GEMINI_API_KEY 또는 인증 요구사항, 설치 prerequisite 명시"
        - "hooks는 cross-platform 규칙 준수 (python3 또는 node 사용)"
        - "plugin.json 스키마 준수 유지"

    # ─────────────────────────────────────────────────────────────
    # Task 3: codex-cli (v1.0.0 / MCP wrapper / skills 없음)
    # ─────────────────────────────────────────────────────────────
    - id: "t3-codex-cli-harden"
      plugin: "codex-cli"
      description: |
        codex-cli는 MCP 래퍼 플러그인. mcpServers 설정의 견고성을 검증하고,
        commands가 codex CLI 실패를 gracefully 처리하며 설치 prerequisite를 문서화.
      acceptance_criteria:
        - "plugins/codex-cli/.claude-plugin/plugin.json: mcpServers.codex 정의 명확 (command: codex, args 검증)"
        - "plugins/codex-cli/README.md: codex CLI 설치 방법·버전 요구사항·인증 설정 명시"
        - "plugins/codex-cli/commands/*.md: codex 실행 실패 시 사용자 안내 포함"
        - "한/영 혼용 문서 용어 통일 (README 전반)"
        - "plugin.json 스키마 준수 (추가 필드 금지)"
      status: "pending"

    # ─────────────────────────────────────────────────────────────
    # Task 4: arch-guard (v0.2.2 / 12 skills / CLAUDE.md 누락)
    # ─────────────────────────────────────────────────────────────
    - id: "t4-arch-guard-docs"
      plugin: "arch-guard"
      description: |
        arch-guard는 12개 skill과 Stop hook을 가진 내부 도구성 플러그인.
        누락된 CLAUDE.md를 추가하고, 과거 fix된 Stop hook 글로벌 실행 이슈가 회귀하지 않았는지 검증.
      acceptance_criteria:
        - "plugins/arch-guard/CLAUDE.md 신설: 플러그인 목적, 12 skill 카테고리, hook 동작 조건, Golden Rules 기재"
        - "plugins/arch-guard/hooks/hooks.json: Stop hook이 arch-guard 프로젝트에서만 동작 (non-arch-guard 프로젝트 침범 방지 회귀 방지)"
        - "plugins/arch-guard/skills/*/SKILL.md: user_invocable:false 12/12 유지 (내부 전용)"
        - "루트 CLAUDE.md의 'Active Plugins' 섹션에 arch-guard 링크 추가 검토"
        - "plugin.json 스키마 준수 유지"
      status: "pending"

    # ─────────────────────────────────────────────────────────────
    # Task 5: multi-model-debate (v1.0.0 / 3 skills / user_invocable 누락)
    # ─────────────────────────────────────────────────────────────
    - id: "t5-debate-metadata-fix"
      plugin: "multi-model-debate"
      description: |
        3개 skill 모두 user_invocable 플래그가 누락됨 (실제 확인). 명시적으로 설정하고,
        round_limit·timeout 등 토론 파이프라인의 제어 변수를 문서화.
      acceptance_criteria:
        - "plugins/multi-model-debate/skills/*/SKILL.md: user_invocable 플래그 3/3개 추가 (의도적 결정으로 true 또는 false)"
        - "SKILL.md frontmatter 필드 네이밍 표준화 (claudemate 다른 플러그인과 일관)"
        - "plugins/multi-model-debate/README.md: 라운드 제한·토론 종료 조건·세 모델 간 역할 분담 명시"
        - "Claude/Codex/Gemini 중 하나라도 미설치 시 degraded mode 또는 명확한 에러 (silent fail 금지)"
        - "plugin.json 스키마 준수 유지"
      status: "pending"

    # ─────────────────────────────────────────────────────────────
    # Task 6: crew (v4.1.1 / 16 skills / tests 있음 / 성숙)
    # ─────────────────────────────────────────────────────────────
    - id: "t6-crew-consistency"
      plugin: "crew"
      description: |
        crew는 성숙한 9-stage orchestrator. 기존 tests/ 실행하여 회귀 없음 확인 후,
        최근 Opus 4.7/1M context 정렬 커밋(5ea4747, 8063cb2) 이후 16 skill 메타데이터가 일관한지 점검.
      acceptance_criteria:
        - "cd plugins/crew && python -m pytest tests/ 전체 통과 (실패 시 수정)"
        - "plugins/crew/skills/*/SKILL.md: user_invocable:false 16/16 유지 (내부 orchestration)"
        - "plugins/crew/CLAUDE.md: Opus 4.7 / 1M context 최신 반영 확인 (최근 커밋과 일관)"
        - "plugins/crew/agents/*.md: model 참조가 최신 Opus 4.7 / Sonnet 4.6 / Haiku 4.5 명시"
        - "plugin.json 스키마 준수 유지 + 버전 드리프트 없음 (4.1.1 3자 일치)"
      status: "pending"

    # ─────────────────────────────────────────────────────────────
    # Task 7: autopilot (v0.4.0 / orchestrator / 마지막)
    # 앞선 6개 태스크에서 누적된 스킬·반성이 최대로 적용됨
    # ─────────────────────────────────────────────────────────────
    - id: "t7-autopilot-integration"
      plugin: "autopilot"
      description: |
        autopilot은 crew+debate+arch-guard+codex-cli를 오케스트레이션하는 entry point.
        앞선 태스크들에서 각 의존 플러그인이 정렬된 뒤, autopilot의 연계 지점과 prerequisite를 검증.
      acceptance_criteria:
        - "plugins/autopilot/hooks/: SessionStart prerequisite 체크가 crew/debate/arch-guard/codex-cli 4개 의존성 모두 검증"
        - "plugins/autopilot/README.md + CLAUDE.md: 5 phase 파이프라인(research→design→build→review→report) 각 단계에서 호출하는 플러그인 명시"
        - "plugins/autopilot/skills/*/SKILL.md: user_invocable:true 1/1 유지 (사용자 진입점)"
        - "autopilot이 호출하는 subagent/command 경로가 앞선 6개 태스크의 변경사항과 일관"
        - "plugin.json 스키마 준수 + 버전 드리프트 없음 (0.4.0 3자 일치)"
      status: "pending"

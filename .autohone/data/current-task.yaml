    output_dir: .analysis/gen-049/
    criteria_file: criteria-harness.yaml
    skills_needed:
      - domain-expert
      - quality-gate
    plugins_analyzed:
      - arch-guard
      - autopilot
      - codex-cli
      - crew
      - gemini-cli
      - multi-model-debate

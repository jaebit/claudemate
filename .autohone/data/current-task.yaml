plan:
  id: plan-20260411-gen-051-hooks-analysis
  title: claudemate Hooks 아키텍처 전수 분석
  status: in_progress
  created_at: '2026-04-11T18:27:00+09:00'
  context:
    task_type: technical-analysis
    generation: gen-051
    domain_type: infra
    model_used: claude-sonnet-4-6
    output_dir: .analysis/gen-051/
    criteria_file: criteria-harness.yaml
    skill_version: domain-expert@1.3.0
    improvement_over: gen-050
    key_fix: "single-pass Write + 구조 품질 AC(grep -c '^##')"
    skills_needed:
      - domain-expert
      - quality-gate
    scope:
      hooks_implemented: [arch-guard, autopilot, crew, gemini-cli]
      hooks_missing: [codex-cli, multi-model-debate, worktree]
      total_plugins: 7
  sprints:
    - id: sprint-1
      title: hooks.json 전수 파싱 + 이벤트 매트릭스 생성
      status: planned
      description: |
        7개 플러그인의 hooks 구현 현황을 fd -H로 완전 탐색.
        4개 hooks.json을 jq로 파싱하여 이벤트 유형·매처·명령을 집계.
        hooks-matrix.md를 single-pass Write로 생성.
      skills_needed:
        - domain-expert
      acceptance_criteria:
        - "test -f .analysis/gen-051/hooks-matrix.md && [ \"$(wc -l < .analysis/gen-051/hooks-matrix.md | tr -d ' ')\" -ge 20 ]"
        - "grep -qi 'PreToolUse\\|PostToolUse\\|Stop\\|hook' .analysis/gen-051/hooks-matrix.md"
        - "grep -qi 'arch-guard\\|autopilot\\|crew\\|gemini' .analysis/gen-051/hooks-matrix.md"
        - "grep -qi 'codex-cli\\|multi-model-debate\\|worktree' .analysis/gen-051/hooks-matrix.md"
        - "[ \"$(grep -c '^##' .analysis/gen-051/hooks-matrix.md)\" -ge 2 ] && [ \"$(grep -c '^##' .analysis/gen-051/hooks-matrix.md)\" -le 6 ]"
        - "fd -H -t f 'hooks.json' plugins/ | wc -l | awk '{if($1==4) exit 0; else exit 1}'"
      dependencies: []

    - id: sprint-2
      title: 패턴 분석 + 미구현 원인 + 리스크·개선 보고서
      status: planned
      description: |
        hooks 이벤트 패턴 공통점·차이점 분석.
        미구현 3개 플러그인의 구조적 원인 파악.
        P0/P1/P2 리스크 항목(jq 근거 명시) + 개선 로드맵.
        hooks-report.md를 single-pass Write로 생성.
      skills_needed:
        - domain-expert
        - quality-gate
      acceptance_criteria:
        - "test -f .analysis/gen-051/hooks-report.md && [ \"$(wc -l < .analysis/gen-051/hooks-report.md | tr -d ' ')\" -ge 30 ]"
        - "grep -E '\\[P0\\]|\\[P1\\]|\\[P2\\]' .analysis/gen-051/hooks-report.md | wc -l | awk '{if($1>=3) exit 0; else exit 1}'"
        - "grep -qi '미구현\\|missing\\|없음' .analysis/gen-051/hooks-report.md"
        - "grep -qi '개선\\|improve\\|recommend' .analysis/gen-051/hooks-report.md"
        - "[ \"$(grep -c '^##' .analysis/gen-051/hooks-report.md)\" -ge 3 ] && [ \"$(grep -c '^##' .analysis/gen-051/hooks-report.md)\" -le 8 ]"
        - "grep -qi 'jq\\|hooks.json\\|event\\|이벤트' .analysis/gen-051/hooks-report.md"
      dependencies:
        - sprint-1

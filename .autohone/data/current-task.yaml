plan:
  id: "plan-20260410-224300-obsidian-debate"
  title: "Obsidian Vault + LLM Wiki 구조 멀티 모델 토론 (2차)"
  status: "in_progress"
  created_at: "2026-04-10T22:43:00+09:00"

  sprints:
    - id: "sprint-1"
      title: "Obsidian Vault 구조 멀티 모델 토론 실행 및 보고서 생성"
      status: "planned"
      acceptance_criteria:
        # [AC-1] 디렉토리 및 state.json 존재 + codex_mode 필드 확인 (빈 파일 방지)
        - >
          test -f .debate/20260410-224300-obsidian-vault-llm-wiki/state.json &&
          grep -q '"codex_mode"' .debate/20260410-224300-obsidian-vault-llm-wiki/state.json
        # [AC-2] synthesis-round-1.md 존재 + 비어있지 않음 (macOS 호환 wc)
        - >
          test -f .debate/20260410-224300-obsidian-vault-llm-wiki/synthesis-round-1.md &&
          [ "$(wc -c < .debate/20260410-224300-obsidian-vault-llm-wiki/synthesis-round-1.md | tr -d ' ')" -gt 100 ]
        # [AC-3] synthesis-round-2.md 존재 + 비어있지 않음 (report.md와 분리 규칙)
        - >
          test -f .debate/20260410-224300-obsidian-vault-llm-wiki/synthesis-round-2.md &&
          [ "$(wc -c < .debate/20260410-224300-obsidian-vault-llm-wiki/synthesis-round-2.md | tr -d ' ')" -gt 100 ]
        # [AC-4] report.md 존재 + unresolved_items 섹션 포함
        - >
          test -f .debate/20260410-224300-obsidian-vault-llm-wiki/report.md &&
          grep -qi "unresolved" .debate/20260410-224300-obsidian-vault-llm-wiki/report.md
        # [AC-5] report.md에 4개 결정 포인트 키워드 모두 포함
        - >
          grep -qi "vault" .debate/20260410-224300-obsidian-vault-llm-wiki/report.md &&
          grep -qi "plugin" .debate/20260410-224300-obsidian-vault-llm-wiki/report.md &&
          grep -qi "sync" .debate/20260410-224300-obsidian-vault-llm-wiki/report.md &&
          grep -qi "agent" .debate/20260410-224300-obsidian-vault-llm-wiki/report.md
      skills_needed:
        - "multi-model-debate/debate-start"
        - "task-planner"
      dependencies: []

  context:
    domain_type: "general"
    debate_id: "20260410-224300-obsidian-vault-llm-wiki"
    output_dir: ".debate/20260410-224300-obsidian-vault-llm-wiki/"
    participants:
      - role: "Knowledge Management Architecture"
        model: "Claude"
      - role: "Obsidian Power User + Plugin Ecosystem"
        model: "Codex (GPT-5.4)"
      - role: "Workflow Integration + Scalability"
        model: "Gemini"
    decision_points:
      - "Obsidian Vault 폴더/태그/링크 구조"
      - "필수 Obsidian 플러그인 구성 (Dataview, Templater, Git sync)"
      - "tree-sitter AST diff 파이프라인 → Obsidian vault 통합 (git sync, 충돌 해결)"
      - "AI Agent ↔ Obsidian 인터페이스 (MCP, Local REST API, direct file, Obsidian URI)"
    prior_consensus:
      - "모듈 중심 wiki 계층 (Tier 1/2/3)"
      - "tree-sitter AST diff + wiki update CLI + 비동기 CI 재생성"
      - "마크다운 파일 + MCP 서버 듀얼 인터페이스"
      - "태스크 유형별 토큰 절약 세분화 (explore 35-80%, edit 0-25%)"
    cli_config:
      codex_exec_pattern: "codex exec \"<prompt>\""
      codex_no_q_flag: true
      gemini_pattern: "gemini -p \"<prompt>\""
    relevant_reflections:
      - id: "inline-r1"
        source: "user-provided"
        lesson: "synthesis-round-N.md는 report.md와 반드시 분리 생성"
      - id: "inline-r2"
        source: "user-provided"
        lesson: "report.md에 unresolved_items 섹션 필수"
      - id: "inline-r3"
        source: "user-provided"
        lesson: "macOS wc -l 공백: tr -d ' ' 또는 awk '{print $1}' 사용"
      - id: "inline-r4"
        source: "user-provided"
        lesson: "Codex CLI fallback: codex exec 패턴, -q 플래그 미지원"
      - id: "inline-r5"
        source: "user-provided"
        lesson: "acceptance criteria에서 파일 존재 + 콘텐츠 검증 모두 포함 (빈 파일 PASS 방지)"
    relevant_skills:
      - "multi-model-debate/debate-start"
      - "task-planner"
    domain_constraints:
      - "synthesis-round-N.md와 report.md는 별도 파일로 분리 생성"
      - "state.json에 codex_mode 필드 포함 필수"
      - "macOS 호환 wc 패턴 사용 (tr -d ' ')"
    skill_rotation_applied: true
    rotation_reason: "task-planner (usage_count 높음)와 multi-model-debate (provisional, 직접 매칭) 혼합 배정으로 다양성 확보"
    model_used: "claude-sonnet-4-6"

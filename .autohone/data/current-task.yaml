  sprints:
    - id: sprint-1
      title: 플러그인 구조 스캔 + 아키텍처 패턴 식별
      status: planned
      description: |
        7개 플러그인의 구성요소(commands, agents, skills, hooks, schemas, tests)를
        체계적으로 집계하고 공통 패턴 vs 이상치(outlier)를 식별.
        plugin.json 스키마 준수 여부 확인.
      skills_needed:
        - domain-expert
      acceptance_criteria:
        - "test -f .analysis/gen-049/structure-map.md && [ \"$(wc -l < .analysis/gen-049/structure-map.md | tr -d ' ')\" -ge 20 ]"
        - "grep -q 'plugin' .analysis/gen-049/structure-map.md"
        - "grep -qi 'plugin.json' .analysis/gen-049/structure-map.md"
        - "grep -qi 'pattern\\|outlier\\|패턴\\|이상치' .analysis/gen-049/structure-map.md"
      dependencies: []

    - id: sprint-2
      title: 의존성 분석 + 리스크 보고서 생성
      status: planned
      description: |
        플러그인 간 공유 리소스(_shared/) 분석,
        잠재 리스크(단일 장애점, 테스트 미비, 스키마 누락) 식별,
        P0/P1/P2 우선순위 레이블 부여.
      skills_needed:
        - domain-expert
        - quality-gate
      acceptance_criteria:
        - "test -f .analysis/gen-049/risk-report.md && [ \"$(wc -l < .analysis/gen-049/risk-report.md | tr -d ' ')\" -ge 30 ]"
        - "grep -E '\\[P0\\]|\\[P1\\]|\\[P2\\]' .analysis/gen-049/risk-report.md | wc -l | awk '{if($1>=3) exit 0; else exit 1}'"
        - "grep -qi '_shared\\|shared' .analysis/gen-049/risk-report.md"
        - "grep -qi '단일 장애\\|single point\\|테스트\\|test\\|스키마\\|schema' .analysis/gen-049/risk-report.md"
        - "grep -qi '개선\\|improve\\|recommend' .analysis/gen-049/risk-report.md"
      dependencies:
        - sprint-1

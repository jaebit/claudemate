plan:
  id: "plan-20260411-160000-deepfake-freedom"
  title: "딥페이크로 인한 사회적 양극화·선거 영향, 표현의 자유 한계 멀티 모델 토론"
  status: "in_progress"
  created_at: "2026-04-11T16:00:00+09:00"

  sprints:
    - id: "sprint-1"
      title: "SETUP + Round 1 (3모델 병렬) + Synthesis Round 1"
      status: "planned"
      description: |
        외부 지식 Pre-loading 후 3개 모델(Claude, Codex, Gemini)을 동시 디스패치하여
        Round 1 응답 수집, synthesis-round-1.md 생성까지 완료.
      acceptance_criteria:
        # [AC-1] state.json 존재 + codex_mode 필드 포함
        - >
          test -f .debate/20260411-160000-deepfake-freedom/state.json &&
          grep -q '"codex_mode"' .debate/20260411-160000-deepfake-freedom/state.json
        # [AC-2] Round 1 파일 3개 모두 존재 + 각 10줄 이상 (macOS 호환)
        - >
          test -f .debate/20260411-160000-deepfake-freedom/round-1-claude.md &&
          [ "$(wc -l < .debate/20260411-160000-deepfake-freedom/round-1-claude.md | tr -d ' ')" -ge 10 ]
        - >
          test -f .debate/20260411-160000-deepfake-freedom/round-1-codex.md &&
          [ "$(wc -l < .debate/20260411-160000-deepfake-freedom/round-1-codex.md | tr -d ' ')" -ge 10 ]
        - >
          test -f .debate/20260411-160000-deepfake-freedom/round-1-gemini.md &&
          [ "$(wc -l < .debate/20260411-160000-deepfake-freedom/round-1-gemini.md | tr -d ' ')" -ge 10 ]
        # [AC-3] synthesis-round-1.md 존재 + 100바이트 이상
        - >
          test -f .debate/20260411-160000-deepfake-freedom/synthesis-round-1.md &&
          [ "$(wc -c < .debate/20260411-160000-deepfake-freedom/synthesis-round-1.md | tr -d ' ')" -gt 100 ]
      skills_needed:
        - "multi-model-debate"
        - "task-planner"
      dependencies: []

    - id: "sprint-2"
      title: "Round 2 (집중 토론) + Synthesis Round 2 + 최종 보고서"
      status: "planned"
      description: |
        Round 1 synthesis 결과를 바탕으로 미합의 DP에 집중하여 Round 2 진행.
        synthesis-round-2.md(별도 파일) + report.md(P0/P1/P2 우선순위 포함) 생성.
      acceptance_criteria:
        # [AC-1] synthesis-round-2.md 존재 + 100바이트 이상 (report.md와 분리 필수)
        - >
          test -f .debate/20260411-160000-deepfake-freedom/synthesis-round-2.md &&
          [ "$(wc -c < .debate/20260411-160000-deepfake-freedom/synthesis-round-2.md | tr -d ' ')" -gt 100 ]
        # [AC-2] report.md 존재 + unresolved 섹션 포함
        - >
          test -f .debate/20260411-160000-deepfake-freedom/report.md &&
          grep -qi "unresolved" .debate/20260411-160000-deepfake-freedom/report.md
        # [AC-3] report.md에 핵심 키워드 모두 포함
        - >
          grep -qi "deepfake\|딥페이크" .debate/20260411-160000-deepfake-freedom/report.md &&
          grep -qi "표현\|freedom\|expression" .debate/20260411-160000-deepfake-freedom/report.md &&
          grep -qi "선거\|election" .debate/20260411-160000-deepfake-freedom/report.md &&
          grep -qi "규제\|regulation" .debate/20260411-160000-deepfake-freedom/report.md
        # [AC-4] report.md에 P0/P1/P2 우선순위 레이블 포함
        - >
          grep -qE "\[P0\]|\[P1\]|\[P2\]" .debate/20260411-160000-deepfake-freedom/report.md
        # [AC-5] synthesis-round-2.md가 report.md와 별도 파일임을 확인 (크기 비교 — 두 파일 모두 존재)
        - >
          test -f .debate/20260411-160000-deepfake-freedom/synthesis-round-2.md &&
          test -f .debate/20260411-160000-deepfake-freedom/report.md
      skills_needed:
        - "multi-model-debate"
      dependencies:
        - "sprint-1"

  context:
    domain_type: "social-policy"
    debate_id: "20260411-160000-deepfake-freedom"
    output_dir: ".debate/20260411-160000-deepfake-freedom/"
    participants:
      - role: "헌법·표현의 자유 전문가"
        model: "Claude (claude-sonnet-4-6)"
      - role: "기술·플랫폼 거버넌스 전문가"
        model: "Codex (GPT-5.4)"
      - role: "민주주의·선거 무결성 전문가"
        model: "Gemini"
    decision_points:
      - id: "DP-1"
        title: "딥페이크 규제 방식"
        question: "딥페이크 제작·배포 규제는 자율규제, 법적 규제, 플랫폼 책임 중 어떤 방식이 최적인가?"
      - id: "DP-2"
        title: "표현의 자유 제한 기준"
        question: "어떤 유형의 딥페이크가 규제 대상이 되어야 하는가? (허위 여부, 동의, 풍자·패러디 예외)"
      - id: "DP-3"
        title: "한국 공직선거법 §82조의8 적정성"
        question: "선거 90일 전 딥페이크 전면 금지는 합헌·비례적인가, 과잉 규제인가?"
      - id: "DP-4"
        title: "기술적 vs 제도적 해결책"
        question: "워터마킹·감지 AI 의무화 vs 사후 제재 vs 라벨링 자율화 중 어떤 접근이 효과적인가?"
    preloaded_knowledge:
      korean_law:
        - "공직선거법 §82조의8 (2024.1.29 시행): 선거 90일 전 딥페이크 선거운동 전면 금지, 위반 시 7년 이하 징역·1천만~5천만원 벌금"
        - "오픈넷 2025.10 헌법소원: 내용 불문 전면 금지는 세계적 유례 없는 위헌적 과잉 규제 주장"
        - "중앙선관위 2025.4: '조금이라도 오인 가능성 있으면 법 위반' 해석 적용"
        - "2024.1.29~2.16 기간 위반 게시물 129건 적발"
      global_regulation:
        - "EU AI Act (2024): AI 생성 콘텐츠 투명성 의무화, 최악의 신원 조작 금지"
        - "California AB 2655: 선거 120일 전 딥페이크 금지 (풍자 예외 포함)"
        - "Cornell Law 2025: 법원, 풍자·예술 표현 냉각 효과 이유로 과도한 정치적 딥페이크 금지에 회의적"
        - "Brennan Center 제안: 공개 의무화 + 선거 직전 기간 기만적 딥페이크만 금지 (federal baseline)"
      empirical_evidence:
        - "CIVICUS 2025: 2024년 선거에서 대규모 딥페이크 선거개입 우려보다 실제 피해 제한적 — GenAI는 오락/풍자/효율 개선에 주로 활용"
        - "Harvard Ash Center 2025: AI 선거운동 활용 광범위, 딥페이크 'apocalypse' 없었음; 전통 미디어가 더 큰 허위정보 원천"
        - "한국 RIIA: 딥페이크가 양극화 심화·선거 결과 불복·언론 불신 야기 가능성 이론적으로 존재"
        - "사우디아라비아: 2024년 초 딥페이크 사고 600% 증가 보고 (단일 국가 예외적 사례)"
    cli_config:
      codex_exec_pattern: "codex exec -s read-only \"<prompt>\""
      codex_no_q_flag: true
      gemini_pattern: "gemini -p \"<prompt>\""
    relevant_skills:
      - "multi-model-debate"
      - "task-planner"
    domain_constraints:
      - "synthesis-round-N.md와 report.md는 반드시 별도 파일로 생성"
      - "state.json에 codex_mode 필드 포함 필수"
      - "macOS 호환 wc 패턴 사용 (tr -d ' ')"
      - "Gemini 프롬프트 마지막 줄에 분량 요구사항 포함 (300 words per DP)"
      - "P0/P1/P2 우선순위 레이블 Recommended Actions에 필수"
    model_used: "claude-sonnet-4-6"
    skill_rotation_applied: false

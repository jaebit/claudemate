  summary: |
    S3 호환 오브젝트 스토리지의 메타데이터를 초고속으로 인덱싱하는 Rust 엔진.
    5개 스프린트 (프로젝트 초기화 → 인덱싱 엔진 → 쿼리 엔진 → 벤치마크 → 테스트)로
